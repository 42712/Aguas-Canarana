
```html
<script>
    let dadosRelatorio = [];
    
    function atualizarDataHora() {
        const agora = new Date();
        document.getElementById("dataHoraAtual").innerHTML = `📅 ${agora.toLocaleDateString('pt-BR')} | ⏰ ${agora.toLocaleTimeString('pt-BR')}`;
    }
    atualizarDataHora();
    setInterval(atualizarDataHora, 1000);

    function limparNomeEquipe(nome) {
        if (!nome) return "Não identificada";

        let nomeLimpo = nome.replace(/^CANARANA\s*-\s*/i, '');
        nomeLimpo = nomeLimpo.replace(/^CANARANA-/i, '');
        nomeLimpo = nomeLimpo.replace(/^OP-/i, 'OP-');

        return nomeLimpo;
    }

    function gerarRelatorio() {

        const html = document.getElementById("htmlInput").value;

        if (!html.trim()) {
            alert("⚠️ Cole o HTML do F12 primeiro!");
            return;
        }

        dadosRelatorio = [];

        // Captura a equipe selecionada
        let equipe = "Não identificada";

        const equipeMatch = html.match(/<span qtip="([^"]*CANARANA[^"]*)"[^>]*>/i);

        if (equipeMatch) {
            equipe = limparNomeEquipe(equipeMatch[1]);
        }

        // Se não achou, tenta outro padrão
        if (equipe === "Não identificada") {

            const equipeMatch2 = html.match(/CANARANA\s*-\s*(OP-[A-Z]+[^<]*)/i);

            if (equipeMatch2) {
                equipe = limparNomeEquipe(equipeMatch2[1]);
            }
        }

        const linhaRegex = /<tr class="I2HUBSB-ab-l[^>]*>([\s\S]*?)<\/tr>/gi;

        let match;
        let count = 0;

        while ((match = linhaRegex.exec(html)) !== null) {

            const linhaHtml = match[1];

            if (linhaHtml.includes("<th")) continue;

            const celulas = [];

            const tdRegex = /<td[^>]*cellindex="(\d+)"[^>]*>(?:<div[^>]*>)*([\s\S]*?)(?:<\/div>)*<\/td>/gi;

            let tdMatch;

            while ((tdMatch = tdRegex.exec(linhaHtml)) !== null) {

                const cellIndex = parseInt(tdMatch[1]);

                let conteudo = tdMatch[2];

                conteudo = conteudo
                    .replace(/<[^>]*>/g, '')
                    .replace(/&nbsp;/g, ' ')
                    .trim();

                celulas[cellIndex] = conteudo;
            }

            const solicitacao = celulas[3] || "";
            const descricao = celulas[8] || "";
            const dataAbertura = celulas[9] || "";
            const dataPrazo = celulas[11] || "";
            const logradouro = celulas[18] || "";
            const numero = celulas[19] || "";
            const bairro = celulas[20] || "";
            let cidade = celulas[21] || "Canarana";

            // Cidade como CANARANA-MT
            if (cidade && cidade !== "Canarana") {
                cidade = cidade.toUpperCase().replace(/-MT$/i, '') + "-MT";
            } else if (cidade === "Canarana") {
                cidade = "CANARANA-MT";
            } else if (cidade && !cidade.includes("-MT")) {
                cidade = cidade.toUpperCase() + "-MT";
            }

            if (solicitacao || logradouro) {

                dadosRelatorio.push({
                    equipe: equipe,
                    solicitacao: solicitacao,
                    descricao: descricao,
                    dataAbertura: dataAbertura,
                    dataPrazo: dataPrazo,
                    logradouro: logradouro,
                    numero: numero,
                    bairro: bairro,
                    cidade: cidade
                });

                count++;
            }
        }

        if (dadosRelatorio.length === 0) {
            alert("❌ Nenhuma OS encontrada. Verifique se o HTML copiado contém as linhas da tabela.");
        } else {
            alert(`✅ ${dadosRelatorio.length} OS(es) encontrada(s)!`);
        }

        renderizarTabela();
    }

    // NORMALIZA TEXTO
    function normalizarTexto(texto) {

        return (texto || "")
            .toString()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase()
            .trim();
    }

    // FILTRO MELHORADO
    function renderizarTabela() {

        const filtroEquipe = normalizarTexto(
            document.getElementById("filtroEquipe").value
        );

        const filtroLogradouro = normalizarTexto(
            document.getElementById("filtroLogradouro").value
        );

        const filtrados = dadosRelatorio.filter(item => {

            const equipe = normalizarTexto(item.equipe);
            const logradouro = normalizarTexto(item.logradouro);
            const solicitacao = normalizarTexto(item.solicitacao);
            const descricao = normalizarTexto(item.descricao);
            const bairro = normalizarTexto(item.bairro);
            const cidade = normalizarTexto(item.cidade);

            // FILTRO EQUIPE
            const matchEquipe =
                filtroEquipe === "" ||
                equipe.includes(filtroEquipe) ||
                solicitacao.includes(filtroEquipe) ||
                descricao.includes(filtroEquipe);

            // FILTRO LOGRADOURO
            const matchLogradouro =
                filtroLogradouro === "" ||
                logradouro.includes(filtroLogradouro) ||
                bairro.includes(filtroLogradouro) ||
                cidade.includes(filtroLogradouro);

            return matchEquipe && matchLogradouro;
        });

        const tbody = document.getElementById("tabelaBody");

        tbody.innerHTML = "";

        for (const item of filtrados) {

            const enderecoCompleto =
                `${item.logradouro} ${item.numero}, ${item.bairro}, ${item.cidade}`.trim();

            const mapsUrl =
                `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(enderecoCompleto)}`;

            const row = tbody.insertRow();

            row.insertCell(0).textContent = item.equipe;
            row.insertCell(1).textContent = item.solicitacao;
            row.insertCell(2).textContent = item.descricao;
            row.insertCell(3).textContent = item.dataAbertura;
            row.insertCell(4).textContent = item.dataPrazo;
            row.insertCell(5).textContent = item.logradouro;
            row.insertCell(6).textContent = item.numero;
            row.insertCell(7).textContent = item.bairro;
            row.insertCell(8).textContent = item.cidade;

            const cellMap = row.insertCell(9);

            const link = document.createElement("a");

            link.href = mapsUrl;
            link.target = "_blank";
            link.textContent = "🗺️ Abrir Mapa";
            link.className = "map-link";

            cellMap.appendChild(link);
        }

        const totalFiltrados = filtrados.length;
        const totalGeral = dadosRelatorio.length;

        let mensagem = `📊 Total de OS: ${totalFiltrados}`;

        if (totalFiltrados !== totalGeral) {
            mensagem += ` (filtrado de ${totalGeral} total)`;
        }

        document.getElementById("totalRegistros").innerHTML = mensagem;

        // Atualiza info do filtro
        const infoDiv = document.getElementById("filtroInfo");

        if (filtroEquipe || filtroLogradouro) {

            infoDiv.innerHTML =
                `🎯 Filtro ativo: ${totalFiltrados} OS(s) exibida(s) de ${totalGeral} total`;

        } else {

            infoDiv.innerHTML =
                `💡 Digite para filtrar em tempo real - ${totalGeral} OS(s) no total`;
        }
    }

    function gerarPDF() {

        if (dadosRelatorio.length === 0) {
            alert("⚠️ Gere o relatório primeiro!");
            return;
        }

        const filtroDiv = document.querySelector('.filtro');
        const filtroInfoDiv = document.querySelector('.filtro-info');
        const botoesCard = document.querySelector('.card:first-of-type');

        if (filtroDiv) filtroDiv.style.display = 'none';
        if (filtroInfoDiv) filtroInfoDiv.style.display = 'none';
        if (botoesCard) botoesCard.style.display = 'none';

        alert("📄 O PDF será gerado usando a impressão do navegador.\n\n1. Clique em 'Salvar como PDF'\n2. Escolha o local para salvar");

        window.print();

        setTimeout(() => {
            if (filtroDiv) filtroDiv.style.display = '';
            if (filtroInfoDiv) filtroInfoDiv.style.display = '';
            if (botoesCard) botoesCard.style.display = '';
        }, 500);
    }

    function fecharModal() {
        document.getElementById("imageModal").style.display = "none";
    }

    // EVENTOS
    document.getElementById("btnGerar").addEventListener("click", gerarRelatorio);
    document.getElementById("btnPDF").addEventListener("click", gerarPDF);

    // FILTRO EM TEMPO REAL
    document.getElementById("filtroEquipe").addEventListener("input", renderizarTabela);
    document.getElementById("filtroLogradouro").addEventListener("input", renderizarTabela);

    document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") fecharModal();
    });
</script>
